# =============================================================================
# docker-compose.yml — Windsurf Cascade MCP Servers
# =============================================================================
#
# Purpose
# -------
# Run MCP (Model Context Protocol) servers for Windsurf Cascade AI tool.
# These servers provide external capabilities like GitHub PR access, Slack
# notifications, code quality reports, and more.
#
# Services
# --------
#   mcp-codecov   — Codecov MCP server (port 8105) [placeholder]
#   mcp-jira      — JIRA MCP server (port 8100) [optional]
#   mcp-clickup   — ClickUp MCP server (port 8101) [optional]
#   mcp-datadog   — DataDog MCP server (port 8106) [optional]
#   mcp-sentry    — Sentry MCP server (port 8107) [optional]
#   mcp-confluence— Confluence MCP server (port 8108) [optional]
#
# Note: GitHub, Slack, and SonarQube now use native Windsurf MCP integration
#       (configured in .windsurf/mcp_config.json)
#
# Quick Start
# -----------
#   1. Copy .env.example to .env and fill in credentials:
#      cp .env.example .env
#
#   2. Start optional MCP servers as needed:
#      docker compose --profile optional up -d mcp-jira mcp-clickup
#
#   3. Verify servers are running:
#      docker compose ps
#      docker compose logs mcp-jira
#
#   4. Configure Windsurf to use these servers:
#      See docs/mcp-docker-setup.md
#
#   5. Stop servers:
#      docker compose down
#
# Local Development
# -----------------
#   Ports are exposed on localhost for Windsurf to connect.
#   See docker-compose.override.yml for additional dev settings.
#
# Prerequisites
# -------------
#   - .env file with MCP credentials (copy from .env.example)
#   - Docker and Docker Compose installed
#   - Windsurf Cascade installed
#
# =============================================================================

name: windsurf-mcp-servers

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
networks:
  windsurf-mcp-network:
    driver: bridge
    name: windsurf-mcp-network

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  sonarqube-mcp-storage:
    name: sonarqube-mcp-storage

# ---------------------------------------------------------------------------
# Common MCP Server Settings
# ---------------------------------------------------------------------------
# All MCP servers:
# - Load credentials from .env (never commit secrets)
# - Connect to windsurf-mcp-network
# - Restart on failure
# - Expose ports on localhost for Windsurf to connect

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # --------------------------------------------------------------------------
  # MCP Server: Codecov (Coverage Reporting)
  # [PLACEHOLDER - Verify actual MCP server implementation exists]
  # --------------------------------------------------------------------------
  mcp-codecov:
    image: mcp/codecov:latest
    container_name: mcp-codecov
    command: ["--transport", "http", "--port", "8105"]
    networks:
      - windsurf-mcp-network
    environment:
      CODECOV_TOKEN: ${CODECOV_TOKEN}
      CODECOV_ORG: ${CODECOV_ORG:-}
      MCP_PORT: "8105"
    ports:
      - "127.0.0.1:8105:8105"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8105/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    profiles:
      - optional

  # --------------------------------------------------------------------------
  # MCP Server: JIRA (Issue Tracking) [OPTIONAL]
  # https://github.com/sooperset/mcp-atlassian
  # --------------------------------------------------------------------------
  mcp-jira:
    image: ghcr.io/sooperset/mcp-atlassian:latest
    container_name: mcp-jira
    command: ["--transport", "sse", "--port", "8100"]
    networks:
      - windsurf-mcp-network
    environment:
      # JIRA Cloud URL (https://your-domain.atlassian.net)
      JIRA_URL: ${JIRA_URL}
      # JIRA account email
      JIRA_USERNAME: ${JIRA_EMAIL}
      # JIRA API token from https://id.atlassian.com/manage-profile/security/api-tokens
      JIRA_API_TOKEN: ${JIRA_API_TOKEN}
    ports:
      - "127.0.0.1:8100:8100"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8100/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    profiles:
      - optional

  # --------------------------------------------------------------------------
  # MCP Server: ClickUp (Issue Tracking) [OPTIONAL]
  # https://github.com/Chisanan232/clickup-mcp-server
  # --------------------------------------------------------------------------
  mcp-clickup:
    image: ghcr.io/chisanan232/clickup-mcp-server:latest
    container_name: mcp-clickup
    networks:
      - windsurf-mcp-network
    environment:
      # ClickUp API token from https://app.clickup.com/settings/apps
      CLICKUP_API_TOKEN: ${CLICKUP_API_TOKEN}
      # Optional: ClickUp Workspace/Team ID
      CLICKUP_TEAM_ID: ${CLICKUP_TEAM_ID:-}
      SERVER_PORT: "8101"
      MCP_TRANSPORT: "sse"
    ports:
      - "127.0.0.1:8101:8101"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8101/health', timeout=3)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    profiles:
      - optional

  # --------------------------------------------------------------------------
  # MCP Server: DataDog (Observability) [OPTIONAL]
  # --------------------------------------------------------------------------
  mcp-datadog:
    image: mcp/datadog:latest
    container_name: mcp-datadog
    command: ["--transport", "http", "--port", "8106"]
    networks:
      - windsurf-mcp-network
    environment:
      DATADOG_API_KEY: ${DATADOG_API_KEY}
      DATADOG_APP_KEY: ${DATADOG_APP_KEY}
      DATADOG_SITE: ${DATADOG_SITE:-datadoghq.com}
      MCP_PORT: "8106"
    ports:
      - "127.0.0.1:8106:8106"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8106/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    profiles:
      - optional

  # --------------------------------------------------------------------------
  # MCP Server: Sentry (Error Tracking) [OPTIONAL]
  # --------------------------------------------------------------------------
  mcp-sentry:
    image: mcp/sentry:latest
    container_name: mcp-sentry
    command: ["--transport", "http", "--port", "8107"]
    networks:
      - windsurf-mcp-network
    environment:
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN}
      SENTRY_ORG: ${SENTRY_ORG}
      SENTRY_URL: ${SENTRY_URL:-https://sentry.io}
      MCP_PORT: "8107"
    ports:
      - "127.0.0.1:8107:8107"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8107/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    profiles:
      - optional

  # --------------------------------------------------------------------------
  # MCP Server: Confluence (Knowledge Search) [OPTIONAL]
  # --------------------------------------------------------------------------
  mcp-confluence:
    image: mcp/confluence:latest
    container_name: mcp-confluence
    command: ["--transport", "http", "--port", "8108"]
    networks:
      - windsurf-mcp-network
    environment:
      CONFLUENCE_URL: ${CONFLUENCE_URL}
      CONFLUENCE_USERNAME: ${CONFLUENCE_EMAIL}
      CONFLUENCE_API_TOKEN: ${CONFLUENCE_API_TOKEN}
      MCP_PORT: "8108"
    ports:
      - "127.0.0.1:8108:8108"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8108/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    profiles:
      - optional
